services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mpp
      POSTGRES_PASSWORD: mpp
      POSTGRES_DB: mpp
    ports:
      - '5432:5432'
    volumes:
      - mpp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mpp -d mpp']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mpp_pgdata:
