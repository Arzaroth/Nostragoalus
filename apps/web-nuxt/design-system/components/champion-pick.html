<!-- @dsCard group="Components" name="Champion pick" subtitle="The one emotional card: gold-glow crest showcase, crown badge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Champion pick - Nostragoalus</title>
<style>
  :root{--p-primary-color:#4f46e5;--p-content-background:#fff;--p-content-border-color:#d8dcef;--p-text-color:#3a3f5b;--p-text-muted-color:#686e94;--ng-base:#e7e8f6;--ng-accent:#10b981;--ng-star:#f59e0b;--ng-font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
  .app-dark{--p-primary-color:#818cf8;--p-content-background:#18181b;--p-content-border-color:#3f3f46;--p-text-color:rgba(255,255,255,.87);--p-text-muted-color:#a1a1aa;--ng-base:#09090b;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--ng-font);background:#0d0f1a;padding:24px;-webkit-font-smoothing:antialiased;}
  .previews{display:flex;flex-wrap:wrap;gap:20px;}
  .scheme{flex:1;min-width:360px;color:var(--p-text-color);padding:30px;border-radius:18px;
    background:radial-gradient(900px 600px at 100% 0%,color-mix(in srgb,var(--ng-accent) 14%,transparent),transparent),radial-gradient(720px 560px at 50% 120%,color-mix(in srgb,var(--ng-star) 10%,transparent),transparent),radial-gradient(1150px 840px at 0% -10%,color-mix(in srgb,var(--p-primary-color) 28%,transparent),transparent),var(--ng-base);}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--p-text-muted-color);margin-bottom:18px;}
  .ng-card{background:var(--p-content-background);border:1px solid var(--p-content-border-color);border-radius:1rem;padding:20px;display:flex;align-items:center;gap:24px;}
  .scheme:not(.app-dark) .ng-card{box-shadow:0 1px 2px rgba(30,27,75,.06),0 4px 12px rgba(30,27,75,.05);}
  .ttl{display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:1.05rem;margin-bottom:4px;}
  .hint{font-size:.82rem;color:var(--p-text-muted-color);margin:0 0 12px;}
  .lock{display:inline-flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--p-text-muted-color);}
  .show{position:relative;flex-shrink:0;}
  .glow{position:absolute;inset:-20px;border-radius:9999px;filter:blur(18px);background:radial-gradient(circle,rgba(245,179,1,.4),transparent 70%);pointer-events:none;}
  .crest{position:relative;width:80px;height:80px;border-radius:1rem;display:flex;align-items:center;justify-content:center;font-size:2rem;background:var(--p-content-background);border:1px solid var(--p-content-border-color);}
  .crown{position:absolute;top:-16px;left:-16px;font-size:1.75rem;transform:rotate(-25deg);z-index:2;}
  .picked{text-align:center;font-weight:700;margin-top:8px;font-size:.85rem;}
  .empty .crest{border:2px dashed var(--p-content-border-color);color:var(--p-text-muted-color);font-size:1.5rem;}
  .empty .crown{opacity:.3;filter:grayscale(1);}
</style>
</head>
<body>
  <div class="previews">
    <section class="scheme">
      <div class="lbl">Light - saved pick (gold glow)</div>
      <div class="ng-card">
        <div style="flex:1;min-width:0">
          <div class="ttl"><span style="font-size:1.4rem">&#127942;</span> Your champion</div>
          <p class="hint">Pick who lifts the trophy. +10 if you're right.</p>
          <span class="lock">&#128274; Locked in</span>
        </div>
        <div class="show">
          <span class="crown">&#128081;</span>
          <span class="glow"></span>
          <div class="crest">&#127467;&#127479;</div>
          <div class="picked">France</div>
        </div>
      </div>
    </section>
    <section class="scheme app-dark">
      <div class="lbl">Dark - no pick yet (dashed placeholder)</div>
      <div class="ng-card empty">
        <div style="flex:1;min-width:0">
          <div class="ttl"><span style="font-size:1.4rem">&#127942;</span> Your champion</div>
          <p class="hint">Pick who lifts the trophy. +10 if you're right.</p>
        </div>
        <div class="show">
          <span class="crown">&#128081;</span>
          <div class="crest">?</div>
          <div class="picked" style="color:var(--p-text-muted-color)">Choose</div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
