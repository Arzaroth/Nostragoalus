# Dev overlay: docker compose -f compose.yaml -f compose.dev.yaml up
# Adds the maildev mail catcher (inbox UI on http://localhost:1080), points the
# app's SMTP at it, layers optional .env.dev, and provides the hot-reload app.

services:
  # Loopback-only db publish for host tooling (local `pnpm dev`, psql, drizzle-kit).
  # The prod base keeps the db unpublished (the app talks to it in-network).
  db:
    ports:
      - '127.0.0.1:5432:5432'

  maildev:
    image: maildev/maildev:2.2.1
    restart: unless-stopped
    ports:
      - '127.0.0.1:1080:1080'
      - '127.0.0.1:1025:1025'

  # OIDC IdP for the SSO e2e (and future SCIM). Opt-in via the `e2e` profile so a
  # plain `mise run dev` doesn't pay the JVM. The issuer is http://keycloak:8080:
  # the app reaches it by this service name on the compose network, and the e2e
  # browser resolves `keycloak` -> 127.0.0.1 via Playwright's host-resolver-rules,
  # so both sides of the OIDC dance use one URL (no /etc/hosts edit needed).
  keycloak:
    profiles: ['e2e']
    image: quay.io/keycloak/keycloak:26.0
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://keycloak:8080
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_HEALTH_ENABLED: 'true'
    ports:
      - '127.0.0.1:8080:8080'
    volumes:
      - ./tests/e2e/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro

  # Loopback publish of the rustfs S3 API + console (default creds rustfsadmin),
  # for host tooling and poking the bucket during dev.
  rustfs:
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'

  app:
    environment:
      NUXT_SMTP_URL: smtp://maildev:1025
    env_file:
      - path: .env
        required: false
      - path: .env.dev
        required: false
    depends_on:
      maildev:
        condition: service_started

  # Hot reload: docker compose -f compose.yaml -f compose.dev.yaml --profile dev up app-dev
  app-dev:
    profiles: ['dev']
    build:
      context: .
      target: dev
    image: nostragoalus-app:dev
    env_file:
      - path: .env
        required: false
      - path: .env.dev
        required: false
    environment:
      NODE_ENV: development
      # Apply pending migrations on boot, same as the prod app service - so a
      # freshly imported / older dump is brought up to the code's schema.
      RUN_MIGRATIONS: 'true'
      DATABASE_URL: postgres://nostragoalus:nostragoalus@db:5432/nostragoalus
      NUXT_DATABASE_URL: postgres://nostragoalus:nostragoalus@db:5432/nostragoalus
      NUXT_SMTP_URL: smtp://maildev:1025
      # nuxi's dep check runs pnpm install on start; when the node_modules volume
      # is stale vs the lockfile it wants to purge, and with no TTY it aborts.
      # CI=true makes the purge+reinstall non-interactive (the npm_config_/.npmrc
      # knob isn't honored by pnpm 11). Lockfile is in sync, so frozen is fine.
      CI: 'true'
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - .:/app
      # Container-private dirs: node_modules from the image, and build output
      # (.nuxt/.output) kept OFF the bind mount - the container runs as root,
      # and root-owned artifacts on the host break host-side pnpm/nuxt runs.
      - /app/node_modules
      - /app/.nuxt
      - /app/.output
    depends_on:
      db:
        condition: service_healthy
      maildev:
        condition: service_started
