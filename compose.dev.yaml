# Dev overlay: docker compose -f compose.yaml -f compose.dev.yaml up
# Adds the maildev mail catcher (inbox UI on http://localhost:1080), points the
# app's SMTP at it, layers optional .env.dev, and provides the hot-reload app.

services:
  # Loopback-only db publish for host tooling (local `pnpm dev`, psql, drizzle-kit).
  # The prod base keeps the db unpublished (the app talks to it in-network).
  db:
    ports:
      - '127.0.0.1:5432:5432'

  maildev:
    image: maildev/maildev:2.2.1
    restart: unless-stopped
    ports:
      - '127.0.0.1:1080:1080'
      - '127.0.0.1:1025:1025'

  app:
    environment:
      NUXT_SMTP_URL: smtp://maildev:1025
    env_file:
      - path: .env
        required: false
      - path: .env.dev
        required: false
    depends_on:
      maildev:
        condition: service_started

  # Hot reload: docker compose -f compose.yaml -f compose.dev.yaml --profile dev up app-dev
  app-dev:
    profiles: ['dev']
    build:
      context: .
      target: dev
    image: nostragoalus-app:dev
    env_file:
      - path: .env
        required: false
      - path: .env.dev
        required: false
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://nostragoalus:nostragoalus@db:5432/nostragoalus
      NUXT_DATABASE_URL: postgres://nostragoalus:nostragoalus@db:5432/nostragoalus
      NUXT_SMTP_URL: smtp://maildev:1025
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - .:/app
      # Container-private dirs: node_modules from the image, and build output
      # (.nuxt/.output) kept OFF the bind mount - the container runs as root,
      # and root-owned artifacts on the host break host-side pnpm/nuxt runs.
      - /app/node_modules
      - /app/.nuxt
      - /app/.output
    depends_on:
      db:
        condition: service_healthy
      maildev:
        condition: service_started
