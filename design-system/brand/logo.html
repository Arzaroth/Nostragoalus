<!-- @dsCard group="Brand" name="Logo & wordmark" subtitle="Crystal-ball mark, emblem, avatar, banner - the football oracle" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brand - Nostragoalus</title>
<style>
  :root{--p-primary-color:#4f46e5;--p-text-color:#3a3f5b;--p-text-muted-color:#686e94;--ng-base:#0f1020;--ng-accent:#10b981;--ng-star:#f59e0b;--ng-font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--ng-font);background:#0d0f1a;padding:24px;-webkit-font-smoothing:antialiased;color:rgba(255,255,255,.9);}
  .stage{padding:36px;border-radius:18px;
    background:radial-gradient(900px 600px at 100% 0%,color-mix(in srgb,var(--ng-accent) 18%,transparent),transparent),radial-gradient(720px 560px at 50% 120%,color-mix(in srgb,var(--ng-star) 12%,transparent),transparent),radial-gradient(1150px 840px at 0% -10%,color-mix(in srgb,var(--p-primary-color) 36%,transparent),transparent),#0b0c1c;}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9197bd;margin-bottom:8px;}
  .hero{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .wordmark{font-size:2.4rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#a5b4fc,#10b981);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .tag{color:#9197bd;font-size:.95rem;margin-top:2px;}
  .logo-mark{width:150px;height:auto;display:block;overflow:visible;}
  .logo-mark .sec{opacity:.18;}
  .row{display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-top:28px;}
  .tile{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .tile img{display:block;border-radius:12px;}
  .cap{font-size:.7rem;color:#9197bd;}
  .cta{margin-top:28px;border-radius:1.5rem;padding:28px;text-align:center;background:linear-gradient(135deg,#4f46e5,#10b981);color:#fff;}
  .cta h2{margin:0 0 6px;font-size:1.4rem;font-weight:800;}
  .cta p{margin:0;color:rgba(255,255,255,.9);font-size:.9rem;}
</style>
</head>
<body>
  <div class="stage">
    <div class="lbl">Primary lockup</div>
    <div class="hero">
      <svg viewBox="220 150 240 320" class="logo-mark" aria-hidden="true">
        <defs>
          <radialGradient id="lm-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#a99bff" stop-opacity="0.85"/><stop offset="55%" stop-color="#6a5fd0" stop-opacity="0.32"/><stop offset="100%" stop-color="#6a5fd0" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="lm-orb" cx="42%" cy="38%" r="70%">
            <stop offset="0%" stop-color="#f5f2ff" stop-opacity="0.97"/><stop offset="40%" stop-color="#beb3f6" stop-opacity="0.82"/><stop offset="78%" stop-color="#7e71d8" stop-opacity="0.45"/><stop offset="100%" stop-color="#5a4fb2" stop-opacity="0.18"/>
          </radialGradient>
        </defs>
        <circle cx="340" cy="275" r="112" fill="url(#lm-glow)"/>
        <circle cx="340" cy="275" r="105" fill="url(#lm-orb)" stroke="#f4d488" stroke-width="1.5" stroke-opacity="0.5"/>
        <g class="lm-sections" fill="#f4d488">
          <path class="sec sec-ring" fill-rule="evenodd" d="M340 170 A105 105 0 1 0 340.01 170 Z M340 197 L414.2 250.9 L385.8 338.1 L294.2 338.1 L265.8 250.9 Z"/>
          <polygon class="sec" points="340,197 414.2,250.9 376.1,263.3 340,237"/>
          <polygon class="sec" points="414.2,250.9 385.8,338.1 362.3,305.7 376.1,263.3"/>
          <polygon class="sec" points="385.8,338.1 294.2,338.1 317.7,305.7 362.3,305.7"/>
          <polygon class="sec" points="294.2,338.1 265.8,250.9 303.9,263.3 317.7,305.7"/>
          <polygon class="sec" points="265.8,250.9 340,197 340,237 303.9,263.3"/>
          <polygon class="sec" points="340,237 376.1,263.3 362.3,305.7 317.7,305.7 303.9,263.3"/>
        </g>
        <g stroke="#f4d488" stroke-width="1.3" fill="none" opacity="0.85">
          <polygon points="340,197 414.2,250.9 385.8,338.1 294.2,338.1 265.8,250.9"/>
          <line x1="340" y1="237" x2="340" y2="197"/><line x1="376.1" y1="263.3" x2="414.2" y2="250.9"/><line x1="362.3" y1="305.7" x2="385.8" y2="338.1"/><line x1="317.7" y1="305.7" x2="294.2" y2="338.1"/><line x1="303.9" y1="263.3" x2="265.8" y2="250.9"/>
          <polygon points="340,237 376.1,263.3 362.3,305.7 317.7,305.7 303.9,263.3" fill="#0e1538" fill-opacity="0.85" stroke-width="1.5"/>
        </g>
        <g fill="#f4d488">
          <circle cx="340" cy="197" r="3.4"/><circle cx="414.2" cy="250.9" r="3.4"/><circle cx="385.8" cy="338.1" r="3.4"/><circle cx="294.2" cy="338.1" r="3.4"/><circle cx="265.8" cy="250.9" r="3.4"/>
          <circle cx="340" cy="237" r="2.3"/><circle cx="376.1" cy="263.3" r="2.3"/><circle cx="362.3" cy="305.7" r="2.3"/><circle cx="317.7" cy="305.7" r="2.3"/><circle cx="303.9" cy="263.3" r="2.3"/>
        </g>
        <g>
          <ellipse cx="340" cy="384" rx="64" ry="15" fill="none" stroke="#e8b75a" stroke-width="3"/>
          <path d="M281 380 C 269 372, 270 356, 283 350" fill="none" stroke="#e8b75a" stroke-width="2.4"/>
          <path d="M399 380 C 411 372, 410 356, 397 350" fill="none" stroke="#e8b75a" stroke-width="2.4"/>
          <path d="M333 394 Q340 396 347 394 L350 448 Q340 452 330 448 Z" fill="#e8b75a"/>
          <circle cx="340" cy="418" r="7.5" fill="#f4d488" stroke="#b8862f" stroke-width="1"/>
          <ellipse cx="340" cy="458" rx="50" ry="12" fill="#e8b75a"/>
        </g>
      </svg>
      <div>
        <div class="wordmark">Nostragoalus</div>
        <div class="tag">The football oracle - predict scores, earn points, outsmart your friends.</div>
      </div>
    </div>

    <div class="lbl" style="margin-top:32px">Asset library</div>
    <div class="row">
      <div class="tile"><img src="assets/mark.svg" alt="emblem" width="96" height="96"><span class="cap">mark.svg (emblem)</span></div>
      <div class="tile"><img src="assets/avatar.svg" alt="avatar" width="72" height="72" style="border-radius:9999px"><span class="cap">avatar.svg (fallback)</span></div>
      <div class="tile"><img src="assets/banner-mini.svg" alt="banner" height="64"><span class="cap">banner-mini.svg</span></div>
    </div>

    <div class="cta">
      <h2>Predict. Score. Win.</h2>
      <p>Final CTA uses the indigo &rarr; emerald diagonal (135deg, #4f46e5 &rarr; #10b981).</p>
    </div>
  </div>
</body>
</html>
