<!-- @dsCard group="Components" name="Password strength" subtitle="4-segment meter, danger -> orange -> yellow -> lime -> success" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Password strength - Nostragoalus</title>
<style>
  :root{--p-primary-color:#4f46e5;--p-content-background:#fff;--p-content-border-color:#d8dcef;--p-text-color:#3a3f5b;--p-text-muted-color:#686e94;--ng-base:#e7e8f6;--ng-accent:#10b981;--ng-star:#f59e0b;--ng-danger:#ef4444;--ng-success:#22c55e;--ng-font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;}
  .app-dark{--p-primary-color:#818cf8;--p-content-background:#18181b;--p-content-border-color:#3f3f46;--p-text-color:rgba(255,255,255,.87);--p-text-muted-color:#a1a1aa;--ng-base:#09090b;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--ng-font);background:#0d0f1a;padding:24px;-webkit-font-smoothing:antialiased;}
  .previews{display:flex;flex-wrap:wrap;gap:20px;}
  .scheme{flex:1;min-width:320px;color:var(--p-text-color);padding:30px;border-radius:18px;
    background:radial-gradient(900px 600px at 100% 0%,color-mix(in srgb,var(--ng-accent) 14%,transparent),transparent),radial-gradient(720px 560px at 50% 120%,color-mix(in srgb,var(--ng-star) 10%,transparent),transparent),radial-gradient(1150px 840px at 0% -10%,color-mix(in srgb,var(--p-primary-color) 28%,transparent),transparent),var(--ng-base);}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--p-text-muted-color);margin-bottom:18px;}
  .meter{width:220px;margin-bottom:18px;}
  .bars{display:flex;gap:4px;}
  .bar{height:4px;flex:1;border-radius:9999px;background:var(--p-content-border-color);}
  .cap{font-size:.72rem;margin-top:5px;font-weight:600;}
</style>
</head>
<body>
  <div class="previews">
    <section class="scheme">
      <div class="lbl">Light - score 0&rarr;4</div>
      <div class="meter"><div class="bars"><span class="bar" style="background:#ef4444"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div><div class="cap" style="color:#ef4444">Very weak</div></div>
      <div class="meter"><div class="bars"><span class="bar" style="background:#f97316"></span><span class="bar" style="background:#f97316"></span><span class="bar"></span><span class="bar"></span></div><div class="cap" style="color:#f97316">Weak</div></div>
      <div class="meter"><div class="bars"><span class="bar" style="background:#eab308"></span><span class="bar" style="background:#eab308"></span><span class="bar" style="background:#eab308"></span><span class="bar"></span></div><div class="cap" style="color:#eab308">Fair</div></div>
      <div class="meter"><div class="bars"><span class="bar" style="background:#22c55e"></span><span class="bar" style="background:#22c55e"></span><span class="bar" style="background:#22c55e"></span><span class="bar" style="background:#22c55e"></span></div><div class="cap" style="color:#22c55e">Strong</div></div>
    </section>
    <section class="scheme app-dark">
      <div class="lbl">Dark - score 0&rarr;4</div>
      <div class="meter"><div class="bars"><span class="bar" style="background:#ef4444"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div><div class="cap" style="color:#ef4444">Very weak</div></div>
      <div class="meter"><div class="bars"><span class="bar" style="background:#f97316"></span><span class="bar" style="background:#f97316"></span><span class="bar"></span><span class="bar"></span></div><div class="cap" style="color:#f97316">Weak</div></div>
      <div class="meter"><div class="bars"><span class="bar" style="background:#84cc16"></span><span class="bar" style="background:#84cc16"></span><span class="bar" style="background:#84cc16"></span><span class="bar"></span></div><div class="cap" style="color:#84cc16">Good</div></div>
      <div class="meter"><div class="bars"><span class="bar" style="background:#22c55e"></span><span class="bar" style="background:#22c55e"></span><span class="bar" style="background:#22c55e"></span><span class="bar" style="background:#22c55e"></span></div><div class="cap" style="color:#22c55e">Strong</div></div>
    </section>
  </div>
</body>
</html>
