<svg width="2752" height="832" viewBox="0 0 688 208" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title>Nostragoalus — the football oracle</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A wide deep-violet cosmic banner. On the left, a glowing light-purple soccer ball with a tilted orbital ring and a sparkle. On the right, the wordmark Nostragoalus with the tagline The Football Oracle. Stars and a shooting star fill the background.</desc>
