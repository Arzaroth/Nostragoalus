# Shortcuts for the compose stacks (mise run <task>).
# app (prod build) and app-dev (HMR) share port 3000 - each task stops the other first.

[tasks.up]
description = "Prod-like stack: built app + db (no mail catcher)"
run = "docker compose -f compose.yaml -f compose.dev.yaml --profile dev stop app-dev 2>/dev/null; docker compose up -d --build --wait"

[tasks.dev]
description = "HMR dev server + db + maildev (source bind-mounted, hot reload)"
run = "docker compose stop app 2>/dev/null; docker compose -f compose.yaml -f compose.dev.yaml --profile dev up -d --build --wait db maildev app-dev"

[tasks.preview]
description = "Built (prod-target) app + db + maildev (dev env, no HMR)"
run = "docker compose -f compose.yaml -f compose.dev.yaml --profile dev stop app-dev 2>/dev/null; docker compose -f compose.yaml -f compose.dev.yaml up -d --build --wait"

[tasks.down]
description = "Stop everything (incl. dev overlay services)"
run = "docker compose -f compose.yaml -f compose.dev.yaml --profile dev down"

[tasks.logs]
description = "Follow app logs (built app)"
run = "docker compose logs -f app"

[tasks.logs-dev]
description = "Follow HMR dev server logs"
run = "docker compose -f compose.yaml -f compose.dev.yaml --profile dev logs -f app-dev"

[tasks.psql]
description = "psql into the database"
run = "docker compose exec db psql -U nostragoalus -d nostragoalus"

[tasks.test]
description = "Run the test suite with the coverage gate"
run = "pnpm test:coverage"

[tasks.e2e-smtp]
description = "E2E: email-OTP flow through the running stack + maildev"
run = "pnpm e2e:smtp"

[tasks.release]
description = "Cut a release: changelog section, version bump, test gate, commit+tag+push (e.g. mise run release 0.9.0)"
run = 'node scripts/release.mjs {{arg(name="version")}}'
