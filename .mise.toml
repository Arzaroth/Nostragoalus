# Repo-level orchestration: the docker compose stacks (mise run <task>).
# App (Nuxt) build/test tasks live in apps/web-nuxt/.mise.toml (run from the
# app dir). Repo-release tasks (release/changelog/roadmap) stay in mise-tasks/.
# app (prod build) and app-dev (HMR) share port 3000 - each task stops the other first.

[env]
# The web app owns the stack; its compose files live in apps/web-nuxt. This
# lets a bare `docker compose` (this file + the mise-tasks/ ops scripts) find
# them from the repo root without -f.
COMPOSE_FILE = "apps/web-nuxt/compose.yaml"


[tasks.up]
description = "Prod-like stack: built app + db + coturn (no mail catcher)"
run = "docker compose -f apps/web-nuxt/compose.yaml -f apps/web-nuxt/compose.dev.yaml --profile dev stop app-dev 2>/dev/null; docker compose --profile voice up -d --build --wait"

[tasks.deploy]
description = "Prod deploy: build + tag the app image with the package.json version, then up the prod stack. NG_RUNTIME=bun runs it under Bun (default Node)."
run = '''
NG_APP_VERSION="$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' apps/web-nuxt/package.json | head -1)"
export NG_APP_VERSION
if [ "$NG_RUNTIME" = "bun" ]; then
  export NG_APP_TARGET=prod-bun NG_APP_TAG_SUFFIX=-bun
  echo "Deploying nostragoalus-app:$NG_APP_VERSION-bun (Bun runtime)"
else
  echo "Deploying nostragoalus-app:$NG_APP_VERSION (Node runtime)"
fi
docker compose --profile voice up -d --build --wait
'''

[tasks.dev]
description = "HMR dev server + db + maildev (source bind-mounted, hot reload)"
run = "docker compose stop app 2>/dev/null; docker compose -f apps/web-nuxt/compose.yaml -f apps/web-nuxt/compose.dev.yaml --profile dev up -d --build --renew-anon-volumes --wait db maildev app-dev"

[tasks.preview]
description = "Built (prod-target) app + db + maildev (dev env, no HMR)"
run = "docker compose -f apps/web-nuxt/compose.yaml -f apps/web-nuxt/compose.dev.yaml --profile dev stop app-dev 2>/dev/null; docker compose -f apps/web-nuxt/compose.yaml -f apps/web-nuxt/compose.dev.yaml up -d --build --wait"

[tasks.down]
description = "Stop everything (incl. dev overlay services)"
run = "docker compose -f apps/web-nuxt/compose.yaml -f apps/web-nuxt/compose.dev.yaml --profile dev down"

[tasks.logs]
description = "Follow app logs (built app)"
run = "docker compose logs -f app"

[tasks.logs-dev]
description = "Follow HMR dev server logs"
run = "docker compose -f apps/web-nuxt/compose.yaml -f apps/web-nuxt/compose.dev.yaml --profile dev logs -f app-dev"

[tasks.psql]
description = "psql into the database"
run = "docker compose exec db psql -U nostragoalus -d nostragoalus"

[tasks.e2e-up]
description = "Bring up the isolated, disposable e2e stack (own DB/maildev/keycloak on shifted ports; never touches the dev DB)."
# Project name is per-worktree (the worktree dir basename) so two worktrees
# don't share one ng-e2e stack: sharing it let a stale sibling container get
# reused with the wrong bind-mount, serving the other branch's source. The ports
# are still shared, so only one e2e stack runs per host at a time. Dots are mapped
# to dashes - a wt worktree dir like `repo.fix-x` is otherwise an invalid docker
# project name.
# Name the services so the prod `app` (host :3000) isn't started alongside.
run = 'docker compose -p "ng-e2e-$(basename "$PWD" | tr . -)" -f apps/web-nuxt/compose.yaml -f apps/web-nuxt/compose.dev.yaml -f apps/web-nuxt/compose.e2e.yaml --profile dev --profile e2e up -d --build db maildev keycloak app-dev'

[tasks.e2e]
description = "Browser e2e (Playwright): predict/finalize/leaderboard + mail + SSO against the isolated e2e stack (own empty DB). See tests/e2e/README.md."
depends = ["e2e-up"]
run = "pnpm -C apps/web-nuxt e2e"

[tasks.e2e-down]
description = "Tear down the isolated e2e stack and drop its DB volume."
run = 'docker compose -p "ng-e2e-$(basename "$PWD" | tr . -)" -f apps/web-nuxt/compose.yaml -f apps/web-nuxt/compose.dev.yaml -f apps/web-nuxt/compose.e2e.yaml -f apps/web-nuxt/compose.e2e-bun.yaml --profile dev --profile e2e --profile e2e-bun down -v'

[tasks.e2e-up-bun]
description = "Bring up the isolated e2e stack with the app under the BUN runtime (prod-bun target) instead of Node."
# Same disposable ng-e2e project as e2e-up, but starts `app-bun` (built prod-bun
# image on :3100) rather than the Node `app-dev`. Only one app runs on :3100 at a
# time, so run e2e OR e2e-bun, not both. See compose.e2e-bun.yaml.
# `--wait` blocks until app-bun is healthy, then a warmup primes Bun's per-route
# SSR (its cold first render can exceed a spec's visibility timeout - a flake, not
# a bug); prewarming the routes the suite hits keeps the run deterministic.
run = '''
docker compose -p "ng-e2e-$(basename "$PWD" | tr . -)" -f apps/web-nuxt/compose.yaml -f apps/web-nuxt/compose.dev.yaml -f apps/web-nuxt/compose.e2e.yaml -f apps/web-nuxt/compose.e2e-bun.yaml --profile dev --profile e2e --profile e2e-bun up -d --build --wait db maildev keycloak app-bun
for p in / /admin /roadmap /leagues /rankings /about /login /signup; do curl -s -o /dev/null --max-time 30 "http://localhost:3100$p" || true; done
'''

[tasks.e2e-bun]
description = "Browser e2e (Playwright) against the app running under BUN (prod-bun). Proves CI can cover the Bun runtime; Node e2e is `mise run e2e`."
depends = ["e2e-up-bun"]
# --retries=2: Bun's cold-start + hydration is a touch slower than Node's, so a
# couple of interaction-timing specs (an SSR control clicked before hydration
# wires it) flake under the parallel suite - a timing flake, not a Bun defect (the
# endpoints and features are verified correct under Bun). Retries let a
# pass-on-retry spec count as flaky, not failed, without weakening the shared test.
run = "pnpm -C apps/web-nuxt exec playwright test --retries=2"
