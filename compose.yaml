name: nostragoalus

# Base (prod-like) stack: app + db only.
# Dev extras (maildev, hot-reload app) live in compose.dev.yaml:
#   docker compose -f compose.yaml -f compose.dev.yaml up
# Shortcuts for the long commands are in .mise.toml (mise run dev / up / ...).

services:
  db:
    image: postgres:17.10-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nostragoalus
      POSTGRES_PASSWORD: nostragoalus
      POSTGRES_DB: nostragoalus
    # No published port: the app reaches the db in-network as `db:5432`. Host
    # access (local `pnpm dev`, psql) is added by compose.dev.yaml, on loopback.
    volumes:
      - nostragoalus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nostragoalus -d nostragoalus']
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for images (avatars, chat images). The app's
  # storage driver defaults to s3 here and points at this service in-network.
  # Credentials default to rustfsadmin/rustfsadmin - override for a real deploy
  # via NUXT_STORAGE_S3_ACCESS_KEY_ID / _SECRET_ACCESS_KEY in .env.
  rustfs:
    # Pinned by digest (rustfs is pre-1.0 beta; :latest would drift on a pull).
    image: rustfs/rustfs:1.0.0-beta.8@sha256:fa19210ac4697c79d7ccca1ec9b0eb91aebacc6691991ffb14014bb3c67e6cc3
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${NUXT_STORAGE_S3_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${NUXT_STORAGE_S3_SECRET_ACCESS_KEY:-rustfsadmin}
    # No published port in prod: the app reaches it as rustfs:9000 in-network.
    # compose.dev.yaml publishes the S3 API + console (9001) on loopback.
    volumes:
      - nostragoalus_media:/data

  # One-shot: rustfs does not auto-create buckets, so make the app's bucket once
  # it is reachable (idempotent: mc mb -p succeeds if it already exists).
  rustfs-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    restart: 'no'
    depends_on:
      rustfs:
        condition: service_started
    environment:
      MC_HOST_ng: http://${NUXT_STORAGE_S3_ACCESS_KEY_ID:-rustfsadmin}:${NUXT_STORAGE_S3_SECRET_ACCESS_KEY:-rustfsadmin}@rustfs:9000
    entrypoint: ['/bin/sh', '-c']
    command:
      - 'until mc ls ng >/dev/null 2>&1; do echo "waiting for rustfs..."; sleep 1; done; mc mb -p ng/${NUXT_STORAGE_S3_BUCKET:-nostragoalus}; echo "bucket ready"'

  # Ephemeral mc client for backup/restore (mise run db-backup / db-restore).
  # Not started normally - run under the `tools` profile via `docker compose run`,
  # which mounts the backup dir at run time (-v) so media pairs with the dump.
  mc:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    profiles: ['tools']
    entrypoint: ['mc']
    environment:
      MC_HOST_ng: http://${NUXT_STORAGE_S3_ACCESS_KEY_ID:-rustfsadmin}:${NUXT_STORAGE_S3_SECRET_ACCESS_KEY:-rustfsadmin}@rustfs:9000

  # TURN relay for voice chat (self-hosted coturn), behind the `voice` profile so
  # the base stack is unchanged for deploys that don't want calls:
  #   docker compose --profile voice up   (mise run up includes it)
  # The app is STUN-only (and calls behind symmetric NAT fail) until this runs and
  # NUXT_TURN_SECRET / NUXT_TURN_HOST are set. use-auth-secret mode: the app mints
  # ephemeral credentials from the shared secret, so coturn stores no accounts.
  #
  # Firewall: forward 3478 (udp+tcp) AND the relay range 49160-49200/udp to this
  # host (5349/tcp too if you enable TLS). If this host is behind NAT (reached via a
  # port-forward), set NUXT_TURN_EXTERNAL_IP to its PUBLIC IP - coturn otherwise
  # advertises the private LAN address as the relay and external browsers can't
  # reach it. This is independent of host vs bridge networking.
  coturn:
    image: coturn/coturn:4.6.2-alpine
    profiles: ['voice']
    restart: unless-stopped
    # Host networking so coturn sees the real interfaces and the whole relay port
    # range without per-port publishing (it does NOT by itself fix a NAT'd host -
    # that is what NUXT_TURN_EXTERNAL_IP is for).
    network_mode: host
    environment:
      NUXT_TURN_SECRET: ${NUXT_TURN_SECRET:-}
      NUXT_TURN_REALM: ${NUXT_TURN_REALM:-nostragoalus}
      NUXT_TURN_EXTERNAL_IP: ${NUXT_TURN_EXTERNAL_IP:-}
    # A shell wrapper so `--external-ip` is added ONLY when NUXT_TURN_EXTERNAL_IP is
    # set (`$$` defers the expansion to the container shell, not compose). For TLS
    # (turns:), append `--cert=... --pkey=...` here and mount the cert (volume below).
    entrypoint: ['/bin/sh', '-c']
    command:
      - >
        exec turnserver -n --use-auth-secret
        --static-auth-secret="$$NUXT_TURN_SECRET"
        --realm="$$NUXT_TURN_REALM"
        --listening-port=3478 --tls-listening-port=5349
        --min-port=49160 --max-port=49200
        --fingerprint --no-cli --no-multicast-peers
        $${NUXT_TURN_EXTERNAL_IP:+--external-ip=$$NUXT_TURN_EXTERNAL_IP}
    # volumes:
    #   - /etc/letsencrypt/live/turn.example.com:/etc/coturn/tls:ro

  app:
    build:
      context: .
      target: prod
    image: nostragoalus-app:local
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: 'true'
      DATABASE_URL: postgres://nostragoalus:nostragoalus@db:5432/nostragoalus
      NUXT_DATABASE_URL: postgres://nostragoalus:nostragoalus@db:5432/nostragoalus
      # Images live in the rustfs bucket. Override the driver to 'fs' in .env to
      # write to a mounted path instead (then a media volume mount is also needed).
      NUXT_STORAGE_DRIVER: ${NUXT_STORAGE_DRIVER:-s3}
      NUXT_STORAGE_S3_ENDPOINT: http://rustfs:9000
      NUXT_STORAGE_S3_REGION: ${NUXT_STORAGE_S3_REGION:-us-east-1}
      NUXT_STORAGE_S3_BUCKET: ${NUXT_STORAGE_S3_BUCKET:-nostragoalus}
      NUXT_STORAGE_S3_ACCESS_KEY_ID: ${NUXT_STORAGE_S3_ACCESS_KEY_ID:-rustfsadmin}
      NUXT_STORAGE_S3_SECRET_ACCESS_KEY: ${NUXT_STORAGE_S3_SECRET_ACCESS_KEY:-rustfsadmin}
    # Bound to loopback: put a reverse proxy (TLS, the public BETTER_AUTH_URL host)
    # in front. Change to '3000:3000' only if exposing the app directly.
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      db:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully

volumes:
  nostragoalus_pgdata:
  nostragoalus_media:
