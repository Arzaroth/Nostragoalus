name: nostragoalus

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nostragoalus
      POSTGRES_PASSWORD: nostragoalus
      POSTGRES_DB: nostragoalus
    ports:
      - '5432:5432'
    volumes:
      - nostragoalus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nostragoalus -d nostragoalus']
      interval: 5s
      timeout: 5s
      retries: 10

  # Production app: `docker compose up` builds and runs this.
  app:
    build:
      context: .
      target: prod
    image: nostragoalus-app
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: 'true'
      DATABASE_URL: postgres://nostragoalus:nostragoalus@db:5432/nostragoalus
      NUXT_DATABASE_URL: postgres://nostragoalus:nostragoalus@db:5432/nostragoalus
      # Local mail catcher (maildev); replace with a real SMTP URL in production.
      NUXT_SMTP_URL: smtp://maildev:1025
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

  # Local mail catcher for 2FA email codes: SMTP on 1025, inbox UI on http://localhost:1080.
  maildev:
    image: maildev/maildev
    restart: unless-stopped
    ports:
      - '1080:1080'
      - '1025:1025'

  # Dev app with hot reload: `docker compose --profile dev up app-dev`.
  app-dev:
    profiles: ['dev']
    build:
      context: .
      target: dev
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://nostragoalus:nostragoalus@db:5432/nostragoalus
      NUXT_DATABASE_URL: postgres://nostragoalus:nostragoalus@db:5432/nostragoalus
      NUXT_SMTP_URL: smtp://maildev:1025
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  nostragoalus_pgdata:
